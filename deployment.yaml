apiVersion: apps/v1
kind: Deployment
metadata:
  name: conference-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: conference-app
  template:
    metadata:
      labels:
        app: conference-app
    spec:
      containers:
      - name: conference-app
        image: YOUR_DOCKERHUB/conference-app
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: conference-service
spec:
  type: NodePort
  selector:
    app: conference-app
  ports:
  - port: 80
    nodePort: 30001
